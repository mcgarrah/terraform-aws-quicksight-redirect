formatter: markdown table

header-from: main.tf
footer-from: ""

recursive:
  enabled: false

sections:
  hide-all: false
  show:
    - header
    - inputs
    - outputs
    - resources
    - providers
    - requirements

content: ""

output:
  file: ""
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

output-values:
  enabled: false

sort:
  enabled: true
  by: required

settings:
  anchor: true
  color: true
  default: true
  description: true
  escape: true
  hide-empty: false
  html: true
  indent: 3
  lockfile: false
  read-comments: true
  required: true
  sensitive: true
  type: true
